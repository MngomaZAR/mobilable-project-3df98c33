name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci --no-audit --no-fund --omit=optional
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Run tests
        run: npm test --silent -- --passWithNoTests

  e2e:
    needs: test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}
      EXPO_PUBLIC_STORE_TARGET: development
      EXPO_PUBLIC_DIGITAL_BILLING_PROVIDER: external
      EXPO_PUBLIC_DISABLE_DIGITAL_PURCHASES: "false"
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci --no-audit --no-fund --omit=optional
      - name: Validate required env (CI)
        run: npm run validate:env
      - name: Run end-to-end tests
        run: npm run test:e2e --silent -- --passWithNoTests
