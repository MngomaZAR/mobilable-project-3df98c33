name: Deploy Backend to Dokploy

on:
  workflow_run:
    workflows: ["Build Backend Images"]
    types: [completed]
    branches: ["main", "release/testflight-2026-06"]
  workflow_dispatch: {}

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
      DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
      DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
      DOKPLOY_API_HEALTH_URL: ${{ secrets.DOKPLOY_API_HEALTH_URL }}
      DOKPLOY_API_CONTRACT_URL: ${{ secrets.DOKPLOY_API_CONTRACT_URL }}
    steps:
      - name: Check Dokploy configuration
        id: dokploy_config
        shell: bash
        run: |
          missing=()
          test -n "$DOKPLOY_URL" || missing+=("DOKPLOY_URL")
          test -n "$DOKPLOY_API_KEY" || missing+=("DOKPLOY_API_KEY")
          test -n "$DOKPLOY_COMPOSE_ID" || missing+=("DOKPLOY_COMPOSE_ID")
          test -n "$DOKPLOY_API_HEALTH_URL" || missing+=("DOKPLOY_API_HEALTH_URL")

          if [ "${#missing[@]}" -gt 0 ]; then
            message="Missing Dokploy repo secrets: ${missing[*]}"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "::error::$message"
              exit 1
            fi
            echo "::notice::$message; skipping automatic Dokploy redeploy."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Dokploy compose redeploy
        if: steps.dokploy_config.outputs.configured == 'true'
        shell: bash
        run: |
          base="${DOKPLOY_URL%/}"
          curl --fail-with-body --show-error --silent \
            --request POST "$base/api/compose.redeploy" \
            --header "x-api-key: $DOKPLOY_API_KEY" \
            --header "Content-Type: application/json" \
            --data "{\"composeId\":\"$DOKPLOY_COMPOSE_ID\"}"

      - name: Smoke API health
        if: steps.dokploy_config.outputs.configured == 'true'
        shell: bash
        run: |
          for attempt in {1..18}; do
            if curl --fail --show-error --silent "$DOKPLOY_API_HEALTH_URL" | grep -q '"status"[[:space:]]*:[[:space:]]*"ok"'; then
              echo "API health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "::error::API health check did not return {\"status\":\"ok\"}"
          exit 1

      - name: Smoke API contract
        if: steps.dokploy_config.outputs.configured == 'true'
        shell: bash
        run: |
          contract_url="${DOKPLOY_API_CONTRACT_URL:-${DOKPLOY_API_HEALTH_URL%/health}/health/contract}"
          for attempt in {1..18}; do
            body="$(curl --show-error --silent "$contract_url" || true)"
            if echo "$body" | grep -q '"ok"[[:space:]]*:[[:space:]]*true'; then
              echo "API contract check passed"
              exit 0
            fi
            echo "Contract check attempt $attempt failed: ${body:0:600}"
            sleep 10
          done
          echo "::error::API contract check did not return {\"ok\":true}"
          exit 1
