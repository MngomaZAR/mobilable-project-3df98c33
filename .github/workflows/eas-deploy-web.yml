name: EAS Deploy Web

# Deploys the web app to EAS Hosting on every push to main.
#
# Required secret: EXPO_TOKEN (create at expo.dev/settings/access-tokens)
# Runtime environment is pulled from EAS production env before validation/export.

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --no-optional

      - name: Validate required env (release)
        run: |
          npx eas-cli@latest env:exec production "npm run validate:env:release" --non-interactive
          npm run audit:release-runtime

      - name: Export web bundle
        run: |
          set -a
          . ./.env.eas.production
          set +a
          npx expo export -p web

      - name: Deploy to EAS Hosting
        run: npx eas-cli deploy --prod --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
