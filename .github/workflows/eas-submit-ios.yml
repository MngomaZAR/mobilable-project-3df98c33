name: EAS Submit iOS

# Auto-submit latest production iOS build to TestFlight.
# Requires EXPO_TOKEN and App Store Connect setup in EAS.

on:
  workflow_dispatch:

jobs:
  submit_ios:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "$EXPO_TOKEN" || (echo "Missing EXPO_TOKEN" && exit 1)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --omit=optional

      - name: Validate release env
        run: npx eas-cli@latest env:exec production "npm run validate:env:release" --non-interactive

      - name: Submit latest iOS build (production)
        run: npx eas-cli submit --platform ios --profile production --latest --non-interactive
