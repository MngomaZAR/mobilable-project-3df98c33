name: iOS TestFlight (No EAS)

on:
  workflow_dispatch:

jobs:
  build_and_upload:
    runs-on: macos-14
    timeout-minutes: 90
    env:
      CI: "1"
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
      APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_STORE_TARGET: ${{ secrets.EXPO_PUBLIC_STORE_TARGET }}
      EXPO_PUBLIC_DIGITAL_BILLING_PROVIDER: ${{ secrets.EXPO_PUBLIC_DIGITAL_BILLING_PROVIDER }}
      EXPO_PUBLIC_DISABLE_DIGITAL_PURCHASES: ${{ secrets.EXPO_PUBLIC_DISABLE_DIGITAL_PURCHASES }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "$APPLE_API_KEY_ID" || (echo "Missing APPLE_API_KEY_ID" && exit 1)
          test -n "$APPLE_API_ISSUER_ID" || (echo "Missing APPLE_API_ISSUER_ID" && exit 1)
          test -n "$APPLE_API_KEY_P8_BASE64" || (echo "Missing APPLE_API_KEY_P8_BASE64" && exit 1)
          test -n "$APPLE_TEAM_ID" || (echo "Missing APPLE_TEAM_ID" && exit 1)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --omit=optional

      - name: Validate required env (release)
        run: npm run validate:env:release

      - name: Generate iOS project
        run: npx expo prebuild --platform ios --non-interactive --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Prepare App Store Connect key
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Resolve workspace and scheme
        run: |
          WORKSPACE="$(find ios -maxdepth 1 -name '*.xcworkspace' | head -n 1)"
          if [ -z "$WORKSPACE" ]; then
            echo "No xcworkspace found under ios/"
            exit 1
          fi
          SCHEME="$(xcodebuild -list -json -workspace "$WORKSPACE" | ruby -rjson -e 'print(JSON.parse(STDIN.read).dig("workspace","schemes")&.first.to_s)')"
          if [ -z "$SCHEME" ]; then
            echo "Could not resolve scheme from workspace $WORKSPACE"
            exit 1
          fi
          echo "IOS_WORKSPACE=$WORKSPACE" >> "$GITHUB_ENV"
          echo "IOS_SCHEME=$SCHEME" >> "$GITHUB_ENV"

      - name: Archive app
        run: |
          ARCHIVE_PATH="$RUNNER_TEMP/${IOS_SCHEME}.xcarchive"
          xcodebuild \
            -workspace "$IOS_WORKSPACE" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$APPLE_API_KEY_PATH" \
            -authenticationKeyID "$APPLE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPLE_API_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            archive
          echo "IOS_ARCHIVE_PATH=$ARCHIVE_PATH" >> "$GITHUB_ENV"

      - name: Create export options
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          echo "IOS_EXPORT_OPTIONS=$RUNNER_TEMP/ExportOptions.plist" >> "$GITHUB_ENV"

      - name: Export IPA
        run: |
          EXPORT_DIR="$RUNNER_TEMP/export"
          mkdir -p "$EXPORT_DIR"
          xcodebuild -exportArchive \
            -archivePath "$IOS_ARCHIVE_PATH" \
            -exportPath "$EXPORT_DIR" \
            -exportOptionsPlist "$IOS_EXPORT_OPTIONS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$APPLE_API_KEY_PATH" \
            -authenticationKeyID "$APPLE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPLE_API_ISSUER_ID"
          IPA_PATH="$(find "$EXPORT_DIR" -maxdepth 1 -name '*.ipa' | head -n 1)"
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA generated."
            ls -la "$EXPORT_DIR"
            exit 1
          fi
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Upload IPA to TestFlight
        run: |
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER_ID"
