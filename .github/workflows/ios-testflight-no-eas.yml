name: iOS TestFlight

on:
  push:
    branches:
      - release/testflight-2026-06
  workflow_dispatch:

jobs:
  build_and_submit:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CI: "1"
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "$EXPO_TOKEN" || (echo "Missing EXPO_TOKEN" && exit 1)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --omit=optional

      - name: Pull EAS production env
        run: npx eas-cli@latest env:pull --environment production --path .env.eas.production --non-interactive

      - name: Validate required env
        run: |
          set -a
          . ./.env.eas.production
          set +a
          npm run validate:env:release

      - name: Build and submit iOS
        run: npx eas-cli@latest build --platform ios --profile production --auto-submit-with-profile production --non-interactive --wait --message "GitHub TestFlight release"
