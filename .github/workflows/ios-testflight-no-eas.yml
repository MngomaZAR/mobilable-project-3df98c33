name: iOS TestFlight

on:
  push:
    branches:
      - release/testflight-2026-06
  workflow_dispatch:

jobs:
  build_and_submit:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CI: "1"
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_STORE_TARGET: both
      EXPO_PUBLIC_DIGITAL_BILLING_PROVIDER: external
      EXPO_PUBLIC_DISABLE_DIGITAL_PURCHASES: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "$EXPO_TOKEN" || (echo "Missing EXPO_TOKEN" && exit 1)
          test -n "$EXPO_PUBLIC_SUPABASE_URL" || (echo "Missing EXPO_PUBLIC_SUPABASE_URL" && exit 1)
          test -n "$EXPO_PUBLIC_SUPABASE_ANON_KEY" || (echo "Missing EXPO_PUBLIC_SUPABASE_ANON_KEY" && exit 1)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --omit=optional

      - name: Validate required env
        run: npm run validate:env:release

      - name: Build and submit iOS
        run: npx eas-cli@latest build --platform ios --profile production --auto-submit-with-profile production --non-interactive --wait --message "GitHub TestFlight release"
