# Minimal config for Supabase CLI (migrations + db push)
# See https://supabase.com/docs/guides/cli/config

project_id = "mobilable-project-3df98c33"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]

[db]
port = 54322
major_version = 17

[db.migrations]
enabled = true

[realtime]
enabled = true

[auth]
enabled = true
site_url = "papzi://auth"
additional_redirect_urls = ["papzi://auth", "papzi://**", "exp://**"]
enable_manual_linking = true

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email]
enable_confirmations = true
max_frequency = "1m0s"
otp_length = 8
